name: Selenium Automation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        browser: [chrome, firefox]
        environment: [dev, qa, prod]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Display Maven version
      run: mvn --version

    - name: Install dependencies
      run: mvn clean install -DskipTests -q

    - name: Run tests for ${{ matrix.environment }} on ${{ matrix.browser }}
      run: mvn test -Denv=${{ matrix.environment }} -Dbrowser=${{ matrix.browser }} -Dheadless=true

    - name: Generate Allure report
      if: always()
      run: mvn allure:report

    - name: Upload Allure results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: allure-results-${{ matrix.os }}-${{ matrix.browser }}-${{ matrix.environment }}
        path: target/allure-results/

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-logs-${{ matrix.os }}-${{ matrix.browser }}-${{ matrix.environment }}
        path: logs/

    - name: Upload screenshots
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: screenshots-${{ matrix.os }}-${{ matrix.browser }}-${{ matrix.environment }}
        path: target/screenshots/

  sauce-labs-integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Install dependencies
      run: mvn clean install -DskipTests -q

    - name: Run tests on Sauce Labs
      env:
        SAUCE_USERNAME: ${{ secrets.SAUCE_USERNAME }}
        SAUCE_ACCESS_KEY: ${{ secrets.SAUCE_ACCESS_KEY }}
      run: mvn test -Denv=prod -Dsauce.labs.enabled=true

    - name: Upload Sauce Labs results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: sauce-labs-results
        path: target/allure-results/

  publish-report:
    name: Publish Allure Report
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3

    - name: Publish Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results-*
        allure_history: allure-history
        keep_reports: 5

    - name: Deploy report to GitHub Pages
      uses: actions/deploy-pages@v2
      if: always()

